name: Sync to Windmill

on:
  push:
    branches:
      - main

env:
  WMILL_URL: https://app.windmill.dev/
  WMILL_WORKSPACE: broccolli-ai-automations

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Skip Windmill-originated commits
        id: check
        # Pass the commit message via env, NOT inline expansion. Inline
        # expansion of ${{ github.event.head_commit.message }} embeds the
        # raw message into the shell script — multi-line messages and
        # shell metacharacters (backticks, $(...), quotes) break parsing
        # or execute as commands. With env: GitHub sets MSG as a real
        # env var that bash reads safely as a string.
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$MSG" == \[WM\]* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to Windmill
        if: steps.check.outputs.skip != 'true'
        # --include-schedules and --include-triggers are passed explicitly because
        # the wmill CLI does not always honor the includeSchedules/includeTriggers
        # flags in wmill.yaml — without the flags, .schedule.yaml and
        # .http_trigger.yaml files are silently ignored even when present in includes.
        # Triggers are version-controlled so HTTP webhook config (e.g. Fireflies)
        # survives Windmill workspace changes — a workspace upgrade silently
        # broke the non-workspaced HTTP trigger route on 2026-04-26, dropping
        # ~9 days of Fireflies webhooks before detection.
        run: |
          npm install -g windmill-cli
          wmill sync push --yes --skip-secrets --include-schedules --include-triggers \
            --workspace ${{ env.WMILL_WORKSPACE }} \
            --token ${{ secrets.WMILL_TOKEN }} \
            --base-url ${{ env.WMILL_URL }}
