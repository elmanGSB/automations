name: Sync to Windmill

on:
  push:
    branches:
      - main

env:
  WMILL_URL: https://app.windmill.dev/
  WMILL_WORKSPACE: broccolli-ai-automations

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Skip Windmill-originated commits
        id: check
        # Pass the commit message via env, NOT inline expansion. Inline
        # expansion of ${{ github.event.head_commit.message }} embeds the
        # raw message into the shell script — multi-line messages and
        # shell metacharacters (backticks, $(...), quotes) break parsing
        # or execute as commands. With env: GitHub sets MSG as a real
        # env var that bash reads safely as a string.
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$MSG" == \[WM\]* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to Windmill
        if: steps.check.outputs.skip != 'true'
        # --include-schedules is passed explicitly because the wmill CLI does not
        # always honor the includeSchedules flag in wmill.yaml — without the flag,
        # .schedule.yaml files are silently ignored even when present in includes.
        run: |
          npm install -g windmill-cli
          wmill sync push --yes --skip-secrets --include-schedules \
            --workspace ${{ env.WMILL_WORKSPACE }} \
            --token ${{ secrets.WMILL_TOKEN }} \
            --base-url ${{ env.WMILL_URL }}
