name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install vm-api (canonical runtime)
        working-directory: vm-api
        run: pip install -e ".[dev]"

      - name: Run vm-api tests
        working-directory: vm-api
        env:
          FIREFLIES_API_KEY: ci-dummy-key
          VM_API_SECRET: ci-dummy-vm-secret
          TELEGRAM_BOT_TOKEN: ci-dummy-token
          TELEGRAM_CHAT_ID: "000000"
        # test_classifier.py tests hit the live Claude BAML proxy (no mock)
        # and can't run in CI without the proxy on 127.0.0.1:8199 — separate
        # follow-up (need to mock the proxy or skip when unreachable).
        run: |
          pytest tests/ -v --tb=short \
            --deselect tests/test_classifier.py::test_tools_research_classification \
            --deselect tests/test_classifier.py::test_advisor_vs_tools_research_disambiguation
