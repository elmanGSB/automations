name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          FIREFLIES_API_KEY: ci-dummy-key
          FIREFLIES_WEBHOOK_SECRET: ci-dummy-secret
          TELEGRAM_BOT_TOKEN: ci-dummy-token
          TELEGRAM_CHAT_ID: "000000"
        run: pytest tests/ -v --tb=short
