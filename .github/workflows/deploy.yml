name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Paperclip VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e
            export PATH="$HOME/.local/bin:$PATH"

            DEPLOY_DIR="$HOME/interview-router"

            echo "==> Pulling latest code..."
            cd "$DEPLOY_DIR"
            git fetch origin
            git reset --hard origin/main

            echo "==> Installing dependencies into venv..."
            "$DEPLOY_DIR/venv/bin/pip" install -r requirements.txt -q

            echo "==> Restarting services..."
            sudo systemctl restart interview-router telegram-bot
            sleep 2
            sudo systemctl is-active interview-router
            sudo systemctl is-active telegram-bot

            echo "==> Deploy complete at $(date)"
