name: Deploy Automations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install vm-api (canonical runtime)
        working-directory: vm-api
        run: pip install -e ".[dev]"
      - name: Run vm-api tests
        working-directory: vm-api
        env:
          FIREFLIES_API_KEY: ci-dummy-key
          VM_API_SECRET: ci-dummy-vm-secret
          TELEGRAM_BOT_TOKEN: ci-dummy-token
          TELEGRAM_CHAT_ID: "000000"
        # Same deselects as ci.yml — test_classifier needs live BAML proxy.
        run: |
          pytest tests/ -v --tb=short \
            --deselect tests/test_classifier.py::test_tools_research_classification \
            --deselect tests/test_classifier.py::test_advisor_vs_tools_research_disambiguation

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync code to VM
        run: |
          rsync -az --delete \
            --exclude '.env' \
            --exclude '.venv/' \
            --exclude '.git/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude '.ruff_cache/' \
            --exclude 'vm-api/state.json*' \
            --exclude 'vm-api/*.tmp' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/elmanamador/automations/

      - name: One-time legacy .env migration
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'set -e; \
             ENV_DEST=/home/elmanamador/automations/vm-api/.env; \
             ENV_LEGACY=/home/elmanamador/vm-api/.env; \
             if [ ! -f "$ENV_DEST" ]; then \
               if [ -f "$ENV_LEGACY" ]; then \
                 echo "One-time migration: $ENV_LEGACY -> $ENV_DEST"; \
                 cp "$ENV_LEGACY" "$ENV_DEST"; \
                 chmod 600 "$ENV_DEST"; \
               else \
                 echo "FATAL: no .env at $ENV_DEST or $ENV_LEGACY — vm-api would start without secrets"; \
                 exit 1; \
               fi; \
             fi'

      - name: Assert FIREFLIES_API_KEY present in VM .env
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash -s <<'REMOTE'
          set -e
          ENV=/home/elmanamador/automations/vm-api/.env
          RAW=$(grep -E '^FIREFLIES_API_KEY=' "$ENV" | head -1 | cut -d= -f2-)
          # Mirror python-dotenv semantics: strip surrounding whitespace,
          # then strip a single pair of surrounding quotes ("" or '').
          VAL=$(printf '%s' "$RAW" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')
          if [[ "$VAL" =~ ^\"(.*)\"$ ]] || [[ "$VAL" =~ ^\'(.*)\'$ ]]; then
            VAL="${BASH_REMATCH[1]}"
          fi
          if [ -z "$VAL" ]; then
            echo "FATAL: FIREFLIES_API_KEY is missing, empty, or quoted-empty in $ENV — every Fireflies webhook would 503"
            echo "Raw line was: '$RAW'"
            exit 1
          fi
          echo "FIREFLIES_API_KEY present (non-empty after dotenv-style parsing)."
          REMOTE

      - name: Upsert Telegram credentials into VM .env
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "FATAL: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret is unset — alert channel would be silently broken"
            exit 1
          fi
          echo "::add-mask::$TELEGRAM_BOT_TOKEN"
          echo "::add-mask::$TELEGRAM_CHAT_ID"
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "TELEGRAM_BOT_TOKEN='$TELEGRAM_BOT_TOKEN' TELEGRAM_CHAT_ID='$TELEGRAM_CHAT_ID' bash -s" <<'REMOTE'
          set -e
          ENV=/home/elmanamador/automations/vm-api/.env
          upsert() {
            local key="$1" val="$2"
            if grep -q "^${key}=" "$ENV"; then
              # Replace in-place. Use a delimiter unlikely to appear in tokens.
              sudo sed -i "s|^${key}=.*|${key}=${val}|" "$ENV"
            else
              echo "${key}=${val}" | sudo tee -a "$ENV" >/dev/null
            fi
          }
          upsert TELEGRAM_BOT_TOKEN "$TELEGRAM_BOT_TOKEN"
          upsert TELEGRAM_CHAT_ID "$TELEGRAM_CHAT_ID"
          sudo chmod 600 "$ENV"
          echo "TELEGRAM_* upserted into $ENV"
          REMOTE

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'which psql > /dev/null || { echo "psql not installed, skipping migrations"; exit 0; } && \
             cd /home/elmanamador/automations && \
             for sql in discovery/*.sql; do \
               echo "Running migration: $sql"; \
               PGPASSWORD=paperclip psql -h 127.0.0.1 -U paperclip -d discovery -f "$sql" 2>&1 | tail -3; \
             done'

      - name: Install systemd unit from repo
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'set -e; \
             UNIT=/etc/systemd/system/vm-api.service; \
             SRC=/home/elmanamador/automations/infra/systemd/vm-api.service; \
             if [ ! -f "$SRC" ]; then echo "FATAL: $SRC missing"; exit 1; fi; \
             sudo install -m 644 "$SRC" "$UNIT"; \
             sudo rm -f /etc/systemd/system/vm-api.service.d/nlm-path.conf; \
             sudo systemctl daemon-reload'

      - name: Assert systemd unit points at canonical runtime
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'set -e; \
             EXPECTED_WD=/home/elmanamador/automations/vm-api; \
             EXPECTED_EXEC=/home/elmanamador/automations/vm-api/.venv/bin/uvicorn; \
             EXPECTED_ENV=/home/elmanamador/automations/vm-api/.env; \
             WD=$(systemctl show vm-api.service -p WorkingDirectory --value); \
             EXEC=$(systemctl show vm-api.service -p ExecStart --value); \
             ENV_FILES=$(systemctl show vm-api.service -p EnvironmentFiles --value); \
             echo "WorkingDirectory=$WD"; \
             echo "ExecStart=$EXEC"; \
             echo "EnvironmentFiles=$ENV_FILES"; \
             echo "$WD" | grep -qx "$EXPECTED_WD" || { echo "FATAL: WorkingDirectory=$WD, expected $EXPECTED_WD"; exit 1; }; \
             echo "$EXEC" | grep -q "$EXPECTED_EXEC" || { echo "FATAL: ExecStart does not reference $EXPECTED_EXEC"; exit 1; }; \
             echo "$ENV_FILES" | grep -q "$EXPECTED_ENV" || { echo "FATAL: EnvironmentFiles does not reference $EXPECTED_ENV"; exit 1; }; \
             echo "Unit configuration verified."'

      - name: Build vm-api venv and install dependencies
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'set -e; \
             cd /home/elmanamador/automations/vm-api && \
             if [ ! -d .venv ]; then python3 -m venv .venv; fi && \
             .venv/bin/pip install --quiet --upgrade pip && \
             .venv/bin/pip install --quiet -r /home/elmanamador/automations/requirements.txt'

      - name: Cutover — stop, migrate state, start
        # Everything that compares mutable state happens AFTER systemctl
        # stop, so no writer (legacy or canonical) can race the check.
        # Preflight only validates JSON parsability of source files —
        # those validations are stable and OK to do while vm-api runs.
        #
        # Divergence guard runs post-stop: if we're trusting an existing
        # canonical (didn't migrate), legacy MUST match dest byte-for-byte
        # at the stopped-state snapshot. Otherwise refuse to retire and
        # let the trap restart the service. After this deploy, legacy is
        # renamed to .retired.<ts> so future deploys never see it.
        #
        # A trap on EXIT restarts vm-api on any failure after the stop,
        # so production is never left down.
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'set -e; \
             STATE_DEST=/home/elmanamador/automations/vm-api/state.json; \
             STATE_LEGACY=/home/elmanamador/vm-api/state.json; \
             NEED_DISCARD_CORRUPT=0; \
             NEED_MIGRATE=0; \
             # --- Preflight (service still running): JSON parse only, no comparisons --- \
             if [ -f "$STATE_DEST" ]; then \
               if ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$STATE_DEST" 2>/dev/null; then \
                 echo "WARN: $STATE_DEST exists but does not parse as JSON — will discard and re-migrate"; \
                 NEED_DISCARD_CORRUPT=1; \
               fi; \
             fi; \
             if [ "$NEED_DISCARD_CORRUPT" = "1" ] || [ ! -f "$STATE_DEST" ]; then \
               if [ -f "$STATE_LEGACY" ]; then \
                 python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$STATE_LEGACY" \
                   || { echo "FATAL: legacy state.json does not parse — refusing to migrate"; exit 1; }; \
                 NEED_MIGRATE=1; \
               fi; \
             fi; \
             # --- Stop window: comparisons + mutations happen here, no writers can race --- \
             trap "sudo systemctl start vm-api 2>/dev/null || true" EXIT; \
             sudo systemctl stop vm-api; \
             if [ "$NEED_DISCARD_CORRUPT" = "1" ]; then \
               mv "$STATE_DEST" "${STATE_DEST}.corrupt.$(date +%s)"; \
             fi; \
             if [ "$NEED_MIGRATE" = "1" ]; then \
               echo "Snapshotting + migrating $STATE_LEGACY -> $STATE_DEST (service stopped)"; \
               cp -a "$STATE_LEGACY" "${STATE_DEST}.tmp"; \
               python3 -c "import json,sys; json.load(open(sys.argv[1]))" "${STATE_DEST}.tmp" \
                 || { echo "FATAL: post-cp .tmp does not parse"; rm -f "${STATE_DEST}.tmp"; exit 1; }; \
               mv "${STATE_DEST}.tmp" "$STATE_DEST"; \
             fi; \
             # Post-stop divergence guard: only matters when we trusted an existing dest \
             # (NEED_MIGRATE=0). After migration, dest is a fresh copy of legacy and they \
             # match by construction. Catches the case where the OLD unit was writing to \
             # legacy in the window between preflight and stop. \
             if [ "$NEED_MIGRATE" = "0" ] && [ -f "$STATE_DEST" ] && [ -f "$STATE_LEGACY" ]; then \
               if ! cmp -s "$STATE_DEST" "$STATE_LEGACY"; then \
                 echo "FATAL: post-stop $STATE_DEST and $STATE_LEGACY differ; refusing to retire legacy."; \
                 echo "       Inspect both files. After deciding which has the newer data:"; \
                 echo "         1. Reconcile manually (e.g. union _processed and _nlm_uploaded into $STATE_DEST)"; \
                 echo "         2. mv $STATE_LEGACY ${STATE_LEGACY}.retired.\$(date +%s)"; \
                 echo "         3. Re-run deploy"; \
                 exit 1; \
               fi; \
               echo "INFO: post-stop $STATE_LEGACY matches $STATE_DEST"; \
             fi; \
             # One-shot retirement: after this deploy, legacy is gone and the divergence \
             # guard above can never trip on subsequent deploys. \
             if [ -f "$STATE_LEGACY" ]; then \
               RETIRED="${STATE_LEGACY}.retired.$(date +%s)"; \
               echo "Retiring $STATE_LEGACY -> $RETIRED"; \
               mv "$STATE_LEGACY" "$RETIRED"; \
             fi; \
             sudo systemctl start vm-api; \
             trap - EXIT'

      - name: Health check
        run: |
          sleep 5
          for i in {1..10}; do
            if curl -sf http://${{ secrets.DEPLOY_HOST }}:3101/health; then
              echo "✓ VM API healthy"
              exit 0
            fi
            echo "Attempt $i/10 — waiting for service..."
            sleep 3
          done
          echo "✗ Health check failed"
          exit 1
