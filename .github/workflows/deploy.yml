name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []  # runs independently — CI already passed for this commit

    steps:
      - name: Deploy to Paperclip VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e

            REPO_URL="https://github.com/elmanGSB/automations.git"
            DEPLOY_DIR="$HOME/interview-router"

            # Clone on first deploy, pull on subsequent ones
            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "==> Pulling latest code..."
              cd "$DEPLOY_DIR"
              git fetch origin
              git reset --hard origin/main
            else
              echo "==> Cloning repo..."
              git clone "$REPO_URL" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            echo "==> Installing dependencies..."
            pip install -r requirements.txt -q

            echo "==> Restarting service..."
            if sudo systemctl is-enabled interview-router &>/dev/null; then
              sudo systemctl restart interview-router
              echo "Service restarted."
            else
              echo "Service not yet installed — run vm-setup.sh first."
            fi

            echo "==> Deploy complete at $(date)"
