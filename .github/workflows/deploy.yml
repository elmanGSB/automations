name: Deploy Automations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short || true

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy code to VM
        run: |
          scp -i ~/.ssh/deploy_key -r -C \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            . ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/elmanamador/automations-new

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'which psql > /dev/null || { echo "psql not installed, skipping migrations"; exit 0; } && \
             cd /home/elmanamador/automations-new && \
             for sql in discovery/*.sql; do \
               echo "Running migration: $sql"; \
               PGPASSWORD=paperclip psql -h 127.0.0.1 -U paperclip -d discovery -f "$sql" 2>&1 | tail -3; \
             done'

      - name: Swap deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'cd /home/elmanamador && \
             [ -d automations-old ] && rm -rf automations-old; \
             [ -d automations ] && mv automations automations-old; \
             mv automations-new automations'

      - name: Bootstrap stable env file location
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'set -e; \
             STABLE=/home/elmanamador/vm-api-env/.env; \
             LEGACY=/home/elmanamador/vm-api/.env; \
             mkdir -p /home/elmanamador/vm-api-env; \
             if [ ! -f "$STABLE" ]; then \
               if [ -f "$LEGACY" ]; then \
                 echo "Bootstrapping $STABLE from $LEGACY (one-time)"; \
                 cp "$LEGACY" "$STABLE"; \
                 chmod 600 "$STABLE"; \
               else \
                 echo "FATAL: no .env at $STABLE or $LEGACY — vm-api would start without secrets"; \
                 exit 1; \
               fi; \
             else \
               echo "$STABLE already present — deploy does not touch it"; \
             fi'

      - name: Install systemd unit from repo
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'set -e; \
             UNIT=/etc/systemd/system/vm-api.service; \
             SRC=/home/elmanamador/automations/infra/systemd/vm-api.service; \
             if [ ! -f "$SRC" ]; then echo "FATAL: $SRC missing"; exit 1; fi; \
             sudo cp "$UNIT" "${UNIT}.bak.$(date +%s)" 2>/dev/null || true; \
             sudo install -m 644 "$SRC" "$UNIT"; \
             sudo rm -f /etc/systemd/system/vm-api.service.d/nlm-path.conf; \
             sudo systemctl daemon-reload'

      - name: Assert systemd unit points at new runtime
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'set -e; \
             EXPECTED_WD=/home/elmanamador/automations/vm-api; \
             EXPECTED_EXEC=/home/elmanamador/automations/vm-api/.venv/bin/uvicorn; \
             EXPECTED_ENV=/home/elmanamador/vm-api-env/.env; \
             WD=$(systemctl show vm-api.service -p WorkingDirectory --value); \
             EXEC=$(systemctl show vm-api.service -p ExecStart --value); \
             ENV_FILES=$(systemctl show vm-api.service -p EnvironmentFiles --value); \
             echo "WorkingDirectory=$WD"; \
             echo "ExecStart=$EXEC"; \
             echo "EnvironmentFiles=$ENV_FILES"; \
             echo "$WD" | grep -qx "$EXPECTED_WD" || { echo "FATAL: WorkingDirectory=$WD, expected $EXPECTED_WD"; exit 1; }; \
             echo "$EXEC" | grep -q "$EXPECTED_EXEC" || { echo "FATAL: ExecStart does not reference $EXPECTED_EXEC"; exit 1; }; \
             echo "$ENV_FILES" | grep -q "$EXPECTED_ENV" || { echo "FATAL: EnvironmentFiles does not reference $EXPECTED_ENV"; exit 1; }; \
             echo "Unit configuration verified."'

      - name: Build vm-api venv and install dependencies
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'set -e; \
             cd /home/elmanamador/automations/vm-api && \
             if [ ! -d .venv ]; then python3 -m venv .venv; fi && \
             .venv/bin/pip install --quiet --upgrade pip && \
             .venv/bin/pip install --quiet -r /home/elmanamador/automations/requirements.txt'

      - name: Restart vm-api
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'sudo systemctl restart vm-api'

      - name: Health check
        run: |
          sleep 5
          for i in {1..10}; do
            if curl -sf http://${{ secrets.DEPLOY_HOST }}:3101/health; then
              echo "✓ VM API healthy"
              exit 0
            fi
            echo "Attempt $i/10 — waiting for service..."
            sleep 3
          done
          echo "✗ Health check failed"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'cd /home/elmanamador && \
             [ -d automations-old ] && \
             { mv automations automations-new 2>/dev/null || true; \
               mv automations-old automations; \
               cd automations && \
               sudo systemctl restart vm-api; } || true'
