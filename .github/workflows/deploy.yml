name: Deploy Automations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short || true

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'which psql > /dev/null || { echo "psql not installed, skipping migrations"; exit 0; } && \
             cd /home/elmanamador/automations && \
             for sql in discovery/*.sql; do \
               echo "Running migration: $sql"; \
               PGPASSWORD=paperclip psql -h 127.0.0.1 -U paperclip -d discovery -f "$sql" 2>&1 | tail -3; \
             done'

      - name: Deploy code
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'cd /home/elmanamador/automations && \
             git fetch origin main && \
             git reset --hard origin/main && \
             git clean -fd && \
             rm -f .gitmodules && \
             git config --remove-section submodule.discovery 2>/dev/null || true && \
             if command -v uv &> /dev/null; then uv pip install -r requirements.txt; else pip3 install -q -r requirements.txt; fi && \
             sudo systemctl restart vm-api'

      - name: Health check
        run: |
          sleep 5
          for i in {1..10}; do
            if curl -sf http://${{ secrets.DEPLOY_HOST }}:3101/health; then
              echo "✓ VM API healthy"
              exit 0
            fi
            echo "Attempt $i/10 — waiting for service..."
            sleep 3
          done
          echo "✗ Health check failed"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'cd /home/elmanamador/automations && \
             git reset --hard HEAD~1 && \
             git clean -fd && \
             sudo systemctl restart vm-api' || true
