name: Deploy Automations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short || true

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VM
        run: |
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project paperclip-tribuai
          gcloud compute scp . paperclip-vm:/home/elmanamador/automations/ --zone=us-central1-f --recurse
          gcloud compute ssh paperclip-vm --zone=us-central1-f -- 'cd /home/elmanamador/automations && git pull origin main && python3 -m pip install -r requirements.txt && sudo systemctl restart vm-api'

      - name: Health check
        run: |
          sleep 5
          for i in {1..10}; do
            if curl -sf http://34.61.120.233:3101/health; then
              echo "VM API healthy"
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          gcloud compute ssh paperclip-vm --zone=us-central1-f -- 'cd /home/elmanamador/automations && git revert HEAD --no-edit && sudo systemctl restart vm-api'
